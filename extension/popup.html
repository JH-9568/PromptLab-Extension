<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PromptLab</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        background: #ffffff;
        color: #1f2328;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      .meta {
        padding: 10px;
        border: 1px solid #d8dee4;
        border-radius: 6px;
        background: #f6f8fa;
      }

      .meta div + div {
        margin-top: 8px;
      }

      .label {
        display: block;
        color: #57606a;
        font-size: 12px;
      }

      code {
        display: block;
        margin-top: 3px;
        word-break: break-all;
      }

      ol {
        margin: 14px 0;
        padding-left: 20px;
      }

      li + li {
        margin-top: 6px;
      }

      .status {
        display: inline-block;
        margin-top: 3px;
        font-weight: 700;
      }

      .status.is-ok {
        color: #1f6f62;
      }

      .status.is-error {
        color: #cf222e;
      }

      .links {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      a {
        display: block;
        padding: 9px 10px;
        border-radius: 6px;
        background: #176b5b;
        color: #ffffff;
        text-align: center;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h1>PromptLab</h1>
    <div class="meta">
      <div>
        <span class="label" data-i18n="anonymousUserId">Anonymous user_id</span>
        <code id="user-id" data-i18n="loading">Loading...</code>
      </div>
      <div>
        <span class="label" data-i18n="server">Server</span>
        <code>promptlab-server.onrender.com</code>
        <span id="server-status" class="status" data-i18n="checking">Checking...</span>
      </div>
    </div>
    <ol>
      <li data-i18n="popupStep1">Write a prompt in ChatGPT.</li>
      <li data-i18n="popupStep2">Click the PromptLab button.</li>
      <li data-i18n="popupStep3">Improve the prompt and insert it into the input box.</li>
      <li data-i18n="popupStep4">Rate the answer after ChatGPT responds.</li>
    </ol>
    <div class="links">
      <a href="https://promptlab-server.onrender.com/api/logs/export/json" target="_blank" rel="noreferrer">Export JSON</a>
      <a href="https://promptlab-server.onrender.com/api/logs/export/csv" target="_blank" rel="noreferrer">Export CSV</a>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
